<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BargasLautaro - Sistema de Registro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #2c3e50; font-size: 1.4rem; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d1d8e0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        #mensaje { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: bold; }
        header { font-weight: bold; margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>

    <header>BargasLautaro</header>

    <div class="container">
        <h2>Enviar Información</h2>
        <input type="text" id="nombre" placeholder="Nombre o Referencia">
        <input type="text" id="dato" placeholder="Dato o Medición">
        <button onclick="enviarDatos()" id="btn">Registrar</button>
        <div id="mensaje"></div>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON LA TUYA
        const MI_URL_SCRIPT = 'https://script.google.com/macros/s/AKfycby8KzqMgcVMFDTqjrBhFzJtKrNa300ChMhz28qz6F073m6-RRfDs309D6Fk4P2DhzaV/exec';

        async function enviarDatos() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('mensaje');
            const nombre = document.getElementById('nombre').value;
            const dato = document.getElementById('dato').value;

            if(!nombre || !dato) {
                msg.innerText = "Por favor, completa ambos campos.";
                msg.style.color = "red";
                return;
            }

            btn.disabled = true;
            msg.innerText = "Enviando...";
            msg.style.color = "#3498db";

            try {
                // Enviamos como JSON pero con modo no-cors para evitar bloqueos
                await fetch(MI_URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombre, dato: dato })
                });

                msg.innerText = "¡Datos registrados con éxito!";
                msg.style.color = "#27ae60";
                document.getElementById('nombre').value = "";
                document.getElementById('dato').value = "";
            } catch (error) {
                msg.innerText = "Error al conectar con el servidor.";
                msg.style.color = "#e74c3c";
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
