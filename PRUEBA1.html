<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BargasLautaro - Registro Directo</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
        .box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h2 { margin: 0 0 20px 0; font-size: 1.2rem; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="submit"] { background-color: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; }
        input[type="submit"]:hover { background-color: #27ae60; }
        #confirmacion { display: none; margin-top: 15px; color: #27ae60; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div style="font-weight: bold; margin-bottom: 10px;">BargasLautaro</div>

    <div class="box">
        <h2>Enviar a Sheets</h2>
        
        <form 
            action="https://script.google.com/macros/s/AKfycby8KzqMgcVMFDTqjrBhFzJtKrNa300ChMhz28qz6F073m6-RRfDs309D6Fk4P2DhzaV/exec" 
            method="POST" 
            target="hidden_iframe" 
            onsubmit="mostrarMensaje()">
            
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="dato" placeholder="Dato técnico" required>
            <input type="submit" value="Registrar Ahora">
        </form>

        <div id="confirmacion">¡Datos enviados con éxito!</div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(sent) finEnvio()"></iframe>

    <script>
        let sent = false;
        function mostrarMensaje() {
            sent = true;
            document.getElementById('confirmacion').style.display = 'block';
            document.getElementById('confirmacion').innerText = 'Procesando...';
        }
        function finEnvio() {
            document.getElementById('confirmacion').innerText = '¡Enviado al Excel!';
        }
    </script>

    <div style="margin-top: 30px; font-size: 0.8rem; color: #888;">BargasLautaro</div>

</body>
</html>
